socks-port: 7891
mixedmixed-port: 7890
mode: rule
allow-lan: false
tcp-timeout: 300
keep-alive-interval: 15
disable-keep-alive: false
log-level: info
ipv6: true
external-doh-server: "/dns-query"
geodata-mode: false
bind-address: "*"
geox-url:
  geoip: "https://cdn.jsdelivr.net/gh/Loyalsoldier/geoip@release/geoip.dat"
  geosite: "https://github.com/Loyalsoldier/v2ray-rules-dat/releases/download/202512160513/geosite.dat"
  mmdb: "https://cdn.jsdelivr.net/gh/Loyalsoldier/geoip@release/Country.mmdb"
  asn: "https://cdn.jsdelivr.net/gh/Loyalsoldier/geoip@release/Country-asn.mmdb"
find-process-mode: strict
#client-fingerprint: chrome
allow-private-domains: false
unified-delay: true
tcp-concurrent: true
experimental:
  quic-go-disable-gso: false
  quic-go-disable-ecn: false
profile:
  store-selected: false
  store-fake-ip: false
dns:
  enable: true
  cache-algorithm: arc
  cache-max-size: 1024
  use-hosts: true
  use-system-hosts: true
  listen: 0.0.0.0:1053
  ipv6: true
  prefer-h3: true
  default-nameserver:
    - 8.8.8.8
    - 1.1.1.1
#  direct-nameserver:
#    - https://223.5.5.5:443/dns-query
#    - https://doh.pub/dns-query 
 #   - https://dns.google/dns-query
 #   - https://dns.alidns.com/dns-query
 # proxy-server-nameserver:
#    - https://doh.pub/dns-query 
#    - https://dns.alidns.com/dns-query
 #   - https://dns.google/dns-query
  nameserver:   
    - 8.8.8.8
    - 1.1.1.1
    - https://dns.google/dns-query
    - https://1.1.1.1/dns-query
#    - https://94.140.14.14/dns-query 
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
#  fallback:
 #   - tls://8.8.8.8:853
 #   - tls://1.1.1.1:853
 #   - 8.8.8.8
 #   - 8.8.4.4
 #   - 1.1.1.1
 #   - 1.0.0.1
#  fallback-filter:
 #   geoip: true
#    geoip-code: MM
 #   geosite:
 #     - gfw
 #   ipcidr:
 #     - 240.0.0.0/4
 #     - 10.0.0.0/8          
#      - 192.168.0.0/16 
#    domain:
     # - '+.gemini.google.com'
   #   - '+.google.com'
  #    - '+.youtube.com'
 #     - '+.mpt.com'
 #     - '+.github.com'
    #  - '+.githubusercontent.com'
