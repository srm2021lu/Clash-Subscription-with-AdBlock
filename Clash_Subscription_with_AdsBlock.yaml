http-port: 7890
socks-port: 7891
mixed-port: 7892
mode: rule
client-fingerprint: chrome 
allow-lan: true
lan-allowed-ips:
  - "0.0.0.0/0"
  - "::/0"
skip-auth-prefixes:
  - "127.0.0.1/8"
  - "::1/128"  
udp: true
external-controller: "127.0.0.1:9090"
external-controller-unix: "mihomo.sock"
external-controller-tls: "127.0.0.1:9443"
external-ui-url: "https://github.com/MetaCubeX/metacubexd/archive/refs/heads/gh-pages.zip"
etag-support: true
tcp-timeout: 60
keep-alive-interval: 15
keep-alive-idle: 15
disable-keep-alive: false
log-level: info
ipv6: false
prefer-h3: false
external-doh-server: "/dns-query"
geodata-mode: true
bind-address: "*"
geox-url:
  geoip: "https://fastly.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geoip.dat"
  geosite: "https://fastly.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geosite.dat"
  mmdb: "https://fastly.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geoip.metadb"
geo-auto-update: true
geo-update-interval: 24
geosite-matcher: succinct
find-process-mode: strict 
unified-delay: true
tcp-concurrent: true
force-dns-mapping: true
override-destination: true
parse-pure-ip: true
profile:
  store-selected: true
  store-fake-ip: true
dns:
  enable: true
  cache-algorithm: arc
  cache-max-size: 1024
  listen: "0.0.0.0:7874"
  ipv6: false
  enhanced-mode: "fake-ip"    
  nameserver: 
    - "8.8.8.8"
    - "https://dns.google/dns-query"
    - "1.1.1.1"
    - "https://cloudflare-dns.com/dns-query"
  fallback-nameserver:
    - "https://8.8.8.8/dns-query"
    - "https://1.1.1.1/dns-query"
    - "tls://8.8.8.8:853"
    - "tls://1.1.1.1:853"
  default-nameserver:
    - "8.8.8.8"
  nameserver-policy:
     "*.github.com": "8.8.8.8"
     "*.githubusercontent.com": "8.8.8.8"
     "geoip:cloudflare": ["1.1.1.1","https://cloudflare-dns.com/dns-query","tls://1.1.1.1:853"]
     "geoip:cloudfront": ["1.1.1.1","https://cloudflare-dns.com/dns-query","tls://1.1.1.1:853"]
     "geosite:google": "8.8.8.8"
     "geosite:facebook": ["tls://8.8.8.8:853","tls://1.1.1.1:853","https:/dns.google/dns-query"]
     "geosite:category-ads-all": "rcode://success"
     "geosite:category-ads": "rcode://success"
  fake-ip-filter:
     - "+.lan"
     - "+.local"
     - "geoip:private"
     - "geoip:category-bank-mm"
sniffer:
  enable: true
  force-dns-mapping: true
  parse-pure-ip: true
  override-destination: true
  sniff:
    HTTP:
      ports: [80, 8443, "8000-8880", 5222]
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  skip-domain:
    - "+.google.com"
    - "geosite:category-bank-mm"
tun:
  enable: true
  stack: system
  mtu: 1422
  auto-route: true
  auto-redirect: true
  auto-detect-interface: true
  dns-hijack:
    - any:53
    - tcp://any:53  
