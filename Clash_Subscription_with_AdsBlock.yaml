socks-port: 7891
mixed-port: 7890
mode: rule
allow-lan: true
lan-allowed-ips:
  - 0.0.0.0/0
  - ::/0
skip-auth-prefixes:
  - 127.0.0.1/8
  - ::1/128  
tcp-timeout: 300
udp: true
external-controller: 127.0.0.1:9090
external-controller-cors:
  allow-origins:
      - '*'
  allow-private-network: true
external-controller-unix: mihomo.sock
external-controller-tls: 127.0.0.1:9443
external-ui-url: "https://github.com/MetaCubeX/metacubexd/archive/refs/heads/gh-pages.zip"
etag-support: true
global-ua: clash.meta
keep-alive-interval: 15
keep-alive-idle: 15
disable-keep-alive: false
log-level: info
ipv6: false
prefer-h3: false
external-doh-server: "/dns-query"
geodata-mode: true
geox-url:
  geoip: "https://cdn.jsdelivr.net/gh/Loyalsoldier/geoip@release/geoip.dat"
  geosite: "https://cdn.jsdelivr.net/gh/Loyalsoldier/v2ray-rules-dat@release/geosite.dat"
  mmdb: "https://cdn.jsdelivr.net/gh/Loyalsoldier/geoip@release/Country.mmdb"
  asn: "https://cdn.jsdelivr.net/gh/Loyalsoldier/geoip@release/GeoLite2-ASN.mmdb"
bind-address: "*"
find-process-mode: strict 
unified-delay: true
tcp-concurrent: true
force-dns-mapping: false
override-destination: false
parse-pure-ip: true
experimental:
  quic-go-disable-gso: true
  quic-go-disable-ecn: true
profile:
  store-selected: true
  store-fake-ip: true
dns:
  nameserver:
    - https://dns.google/dns-query
    - https://cloudflare-dns.com/dns-query
    - system://
  fallback:
    - https://1.1.1.1/dns-query
    - https://8.8.8.8/dns-query
  direct-nameserver:
    - system://
  name-server-policy:
    "geosite:category-ads-all": rcode://success
    "geosite:category-ads": rcode://success
    "geosite:tracker": rcode://success
    "geosite:facebook": rcode://success
  fallback-filter:
    geoip: true
    geoip-code: MM
    geosite:
      - gfw
    ipcidr:
      - 240.0.0.0/4
  cache-algorithm: arc
  cache-max-size: 1024
  use-hosts: true
  use-system-hosts: true
  listen: 0.0.0.0:1053
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
tun:
  enable: true
  stack: mixed
  dns-hijack:
    - "any:53"
  auto-route: true
  auto-detect-interface: true
proxy-providers:
  5MatinGhanbari: 
    type: http
    path: "./proxies/MatinGhanbari.yaml"
    url: "https://raw.githubusercontent.com/MatinGhanbari/v2ray-configs/main/subscriptions/filtered/subs/ss.txt"
    health-check:
      enable: true
      url: "https://www.gstatic.com/generate_204"
      lazy: true
      interval: 300
    etag-support: true
    disable-udp: false
    allow-insecure: true
    skip-cert-verify: true
  3Shuaidaoya:
    type: http
    url: "https://gist.githubusercontent.com/shuaidaoya/9e5cf2749c0ce79932dd9229d9b4162b/raw/all.yaml"
    path: "./proxies/Shuaidaoya.yaml"
    health-check:
      enable: true
      url: "https://www.gstatic.com/generate_204"
      lazy: true
      interval: 300
    etag-support: true
    disable-udp: false
    allow-insecure: true
    skip-cert-verify: true
  OpenProxyRaw :
    type: http
    url: "https://openproxylist.com/v2ray/rawlist/text"
    path: "./proxies/OpenProxyRaw.yaml"
    health-check:
      enable: true
      url: "https://www.gstatic.com/generate_204"
      lazy: true
      interval: 300
    etag-support: true
    disable-udp: false  
    allow-insecure: true    
    skip-cert-verify: true  
  OPV2RayBase64: 
    type: http 
    url: "https://raw.githubusercontent.com/roosterkid/openproxylist/main/V2RAY_BASE64.txt"
    path: "./proxies/OPV2RayBase64.yaml"
    health-check:
      enable: true
      url: "https://www.gstatic.com/generate_204"
      lazy: true
      interval: 300
    etag-support: true
    disable-udp: false  
    allow-insecure: true    
    skip-cert-verify: true  
  v2rayse:
    type: http
    url: "https://v2rayse.com/fs/public/20260424/free-node-share-0800.txt"
    path: "./proxies/v2rayse.yaml"
    health-check:
      enable: true
      url: "https://www.gstatic.com/generate_204"
      lazy: true
      interval: 300
    etag-support: true
    disable-udp: false
    allow-insecure: true
    skip-cert-verify: true 
proxy-groups:
  - name: "General"
    type: "url-test"
    use:
      - 5MatinGhanbari
      - 3Shuaidaoya
      - OpenProxyRaw
      - OPV2RayBase64
      - v2rayse
    url: "https://www.gstatic.com/generate_204"
    interval: 300
    tolerance: 50
    lazy: true
#    filter: "^(?=.*(SG)).*"
    exclude-filter: "(?i)(b2n.ir|v2ray-configs|trojan|日本|@ripaojiedian|socks|🇭🇰|HK|HongKong|香港|🇻🇳|VN|Vietnam|China|CN|🇨🇳|ads|ad-delivery|ad-video|gambling|lucky|jackpot)"

rule-providers:
  REJECT:
    type: http
    behavior: domain
    url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/reject.txt"
    path: ./ruleset/reject.yaml
    interval: 86400
  LANCIDR:
    type: http
    behavior: ipcidr
    url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/lancidr.txt"
    path: ./ruleset/lancidr.yaml
    interval: 86400
  JAPANESE_REJECT:
    type: http
    behavior: domain
    url: "https://raw.githubusercontent.com/AdguardTeam/FiltersRegistry/master/filters/filter_7_Japanese/filter.txt"
    path: ./ruleset/japanese_reject.yaml
    interval: 86400    
  MobileAds:
    type: http
    behavior: domain
    url: "https://raw.githubusercontent.com/AdguardTeam/FiltersRegistry/master/filters/filter_11_Mobile/filter.txt"
    path: ./ruleset/mobileads.yaml
    interval: 86400  
  DNSFilter:
    type: http
    behavior: domain
    url: "https://raw.githubusercontent.com/AdguardTeam/FiltersRegistry/master/filters/filter_15_DnsFilter/filter.txt"
    path: ./ruleset/dnsfilter.yaml
    interval: 86400      
