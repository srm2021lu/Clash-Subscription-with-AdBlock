proxy-groups:
  - name: "General"
    type: "url-test"
    disable-udp: false
    skip-cert-verify: true
    allow-insecure: true
    url: "https://gstatic.com/generate_204"
    health-check:
      enable: true
      interval: 60
      tolerance: 30 
      url: "https://gstatic.com/generate_204"
    exclude-filter: "(?i)(b2n.ir|v2ray-configs|trojan|日本|@ripaojiedian|socks|🇭🇰|HK|HongKong|香港|🇻🇳|VN|Vietnam)"
    include-all: true
    filter: "(?i)(🇸🇬|SG|Singapore|🇯🇵|Japan|JP|TH|Thailand|🇹🇭)"
   
