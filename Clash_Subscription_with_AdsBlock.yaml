proxy-groups:
  - name: "General"
    type: url-test
    disable-udp: false
    skip-cert-verify: true
    allow-insecure: true
    url: "https://gstatic.com/generate_204"
    interval: 150
    tolerance: 50 
    exclude-filter: "(?i)(b2n.ir|v2ray-configs)"
 #   exclude-filter: "(?i)(trojan|🇭🇰|HK|HongKong|香港|HK-|HONG_KONG|hkt|hkbn|\\[trojan\\]|\\(trojan\\)|\\(tj\\)|\\[tj\\])"
  #  filter: "(?i)(🇸🇬|SG|Singapore)"
  #  filter: "(?i)(Japan|🇯🇵|JP|🇸🇬|SG|Singapore)"
        
    include-all: true
      
rule-providers:
  AntiAd:
    type: http
    behavior: domain
    format: yaml
    url: "https://raw.githubusercontent.com/privacy-protection-tools/anti-AD/refs/heads/master/anti-ad-clash.yaml"
    path: "./rules/AntiAd.yaml"
    interval: 86400  
    payload: []
  AntiAdBlock:
    type: http
    behavior: domain
    format: yaml
    url: "https://raw.githubusercontent.com/privacy-protection-tools/anti-AD/master/anti-ad-clash.yaml"
    path: "./rules/AntiAdBlock.yaml"
    interval: 86400
  AdBlocker:
    type: http
    format: text
    behavior: domain
    url: "https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/reject.txt"
    path: "./rules/reject.txt"
    interval: 86400
    payload: []
