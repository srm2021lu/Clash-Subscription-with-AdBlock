socks-port: 7891
mixedmixed-port: 7890
mode: rule
allow-lan: false
tcp-timeout: 300
keep-alive-interval: 15
disable-keep-alive: false
log-level: info
ipv6: false
external-doh-server: "/dns-query"
geodata-mode: true
bind-address: "*"
geox-url:
  geoip: "https://cdn.jsdelivr.net/gh/Loyalsoldier/geoip@release/geoip.dat"
  geosite: "https://github.com/Loyalsoldier/v2ray-rules-dat/releases/download/202512160513/geosite.dat"
  mmdb: "https://cdn.jsdelivr.net/gh/Loyalsoldier/geoip@release/Country.mmdb"
  asn: "https://cdn.jsdelivr.net/gh/Loyalsoldier/geoip@release/Country-asn.mmdb"
find-process-mode: strict
#client-fingerprint: chrome
#allow-private-domains: false
unified-delay: true
tcp-concurrent: true
experimental:
  quic-go-disable-gso: true
  quic-go-disable-ecn: true
profile:
  store-selected: true
  store-fake-ip: true
dns:
  enable: true
  cache-algorithm: arc
  cache-max-size: 1024
  use-hosts: true
  use-system-hosts: true
  listen: 0.0.0.0:1053
  ipv6: false
  #prefer-h3: true
  default-nameserver:
    - 8.8.8.8
    - 1.1.1.1
  nameserver:   
    - 8.8.8.8
    - 1.1.1.1
    - https://dns.google/dns-query
    - https://1.1.1.1/dns-query
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fallback:
    - tls://8.8.8.8:853
    - tls://1.1.1.1:853
    - 8.8.8.8
    - 8.8.4.4
    - 1.1.1.1
    - 1.0.0.1
  fallback-filter:
    geoip: true
    geoip-code: MM
    geosite:
      - gfw

