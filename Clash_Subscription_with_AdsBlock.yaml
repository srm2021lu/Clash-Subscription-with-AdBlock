http-port: 7890
socks-port: 7891
mixed-port: 7892
mode: rule
allow-lan: true
lan-allowed-ips:
  - "0.0.0.0/0"
  - "::/0"
skip-auth-prefixes:
  - "127.0.0.1/8"
  - "::1/128"  
tcp-timeout: 150
udp: true
external-controller: "127.0.0.1:9090"
external-controller-cors:
  allow-origins:
      - "*"
  allow-private-network: true
external-controller-unix: "mihomo.sock"
external-controller-tls: "127.0.0.1:9443"
external-ui-url: "https://github.com/MetaCubeX/metacubexd/archive/refs/heads/gh-pages.zip"
etag-support: true
global-ua: chrome 
keep-alive-interval: 15
keep-alive-idle: 15
disable-keep-alive: false
log-level: info
ipv6: false
prefer-h3: false
external-doh-server: "/dns-query"
geodata-mode: true
bind-address: "*"
geox-url:
  geoip: "https://github.com/Loyalsoldier/v2ray-rules-dat/releases/latest/download/geoip.dat"
  geosite: "https://github.com/Loyalsoldier/v2ray-rules-dat/releases/latest/download/geosite.dat"
  mmdb: "https://cdn.jsdelivr.net/gh/Loyalsoldier/geoip@release/Country.mmdb"
  asn: "https://cdn.jsdelivr.net/gh/Loyalsoldier/geoip@release/Country-asn.mmdb"
find-process-mode: strict 
unified-delay: true
tcp-concurrent: true
force-dns-mapping: false
override-destination: false
parse-pure-ip: true
dns:
  enable: true
  listen: "0.0.0.0:7874"
  ipv6: false
  default-nameserver-policy: all
  enhanced-mode: "fake-ip"    
  fallback:
    - "https://dns.google/dns-query"
    - "tls://8.8.8.8"
    - "https://cloudflare-dns.com/dns-query"
    - "tls://1.1.1.1"
  default-nameserver:
    - "8.8.8.8"
  nameserver-policy:
    "geoip:mm": "8.8.8.8"
    "geosite:category-ads-all": "127.0.0.1"
    "geosite:category-ads": "127.0.0.1"
tun:
  enable: true
  stack: mixed
  auto-route: true
  auto-redirect: true
  auto-detect-interface: true
  dns-hijack:
    - any:53
    - tcp://any:53  
proxy-providers:
  MFuuV2Ray: 
    type: http
    path: "./proxies/MFuuV2Ray.yaml"
    url: "https://raw.githubusercontent.com/mfuu/v2ray/refs/heads/master/clash.yaml"
    health-check:
      enable: true
      interval: 600
      url: "https://www.gstatic.com/generate_204"
    etag-support: true
    disable-udp: false
    allow-insecure: true
    skip-cert-verify: true
  AwesomeVPN: 
    type: http
    path: "./proxies/AwesomeVPM.yaml"
    url: "https://raw.githubusercontent.com/awesome-vpn/awesome-vpn/master/clash.yaml"
    health-check:
      enable: true
      interval: 600
      url: "https://www.gstatic.com/generate_204"
    etag-support: true
    disable-udp: false
    allow-insecure: true
    skip-cert-verify: true
  5MatinGhanbari: 
    type: http
    path: "./proxies/MatinGhanbari.yaml"
    url: "https://raw.githubusercontent.com/MatinGhanbari/v2ray-configs/main/subscriptions/filtered/subs/ss.txt"
    health-check:
      enable: true
      interval: 600
      url: "https://www.gstatic.com/generate_204"
    etag-support: true
    disable-udp: false
    allow-insecure: true
    skip-cert-verify: true
  3Shuaidaoya:
    type: http
    url: "https://gist.githubusercontent.com/shuaidaoya/9e5cf2749c0ce79932dd9229d9b4162b/raw/all.yaml"
    path: "./proxies/Shuaidaoya.yaml"
    health-check:
      enable: true
      interval: 600
      url: "https://www.gstatic.com/generate_204"
    etag-support: true
    disable-udp: false
    allow-insecure: true
    skip-cert-verify: true
  OpenProxyRaw :
    type: http
    url: "https://raw.githubusercontent.com/roosterkid/openproxylist/refs/heads/main/V2RAY_BASE64.txt"
    path: "./proxies/OpenProxyRaw.yaml"
    health-check:
      enable: true
      interval: 600
      url: "https://www.gstatic.com/generate_204"
    etag-support: true
    disable-udp: false  
    allow-insecure: true    
    skip-cert-verify: true  
  v2rayse:
    type: http
    url: "https://v2rayse.com/fs/public/20260424/free-node-share-0800.txt"
    path: "./proxies/v2rayse.yaml"
    health-check:
      enable: true
      interval: 600
      url: "https://www.gstatic.com/generate_204"
    etag-support: true
    disable-udp: false
    allow-insecure: true
    skip-cert-verify: true 

proxy-groups:
  - name: "General"
    type: "url-test"
    use:
      - "5MatinGhanbari"
      - "MFuuV2Ray"
      - "AwesomeVPN"
      - "3Shuaidaoya"
      - "OpenProxyRaw"
      - "v2rayse"
    url: "https://www.gstatic.com/generate_204"
    interval: 300
    tolerance: 50
    exclude-filter: "(?i)(b2n.ir|v2ray-configs|trojan|@ripaojiedian|socks|🇻🇳|VN|Vietnam|China|CN|🇨🇳)"
  - name: "Facebook"
    type: "url-test"
    use:
      - "5MatinGhanbari"
      - "MFuuV2Ray"
      - "AwesomeVPN"
      - "3Shuaidaoya"
      - "OpenProxyRaw"
      - "v2rayse"
    url: "https://gstatic.com/generate_204"
    interval: 300
    tolerance: 50
    filter: "^(?=.*(SG|🇸🇬|Singapore)).*"
    exclude-filter: "(?i)(b2n.ir|v2ray-configs|trojan|@ripaojiedian|socks|🇻🇳|VN|Vietnam|China|CN|🇨🇳)"
rule-providers:
  reject:
    type: http
    behavior: domain
    url: 'https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/reject.txt'
    path: "./rules/reject.yaml"
    interval: 86400    
  AntiAdBlock:
    type: http
    behavior: domain
    format: yaml
    url: "https://raw.githubusercontent.com/privacy-protection-tools/anti-AD/master/anti-ad-clash.yaml"
    path: "./rules/AntiAdBlock.yaml"
    interval: 86400
  AdBlocker:
    type: http
    format: text
    behavior: domain
    url: "https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/reject.txt"
    path: "./rules/reject.txt"
    interval: 86400

