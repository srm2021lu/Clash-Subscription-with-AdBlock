socks-port: 7891
mixed-port: 7890
udp: true 
mode: rule
tcp-timeout: 300
external-controller: 0.0.0.0:9090
keep-alive-interval: 15
disable-keep-alive: false
log-level: info
ipv6: false
external-doh-server: "/dns-query"
geodata-mode: true
bind-address: "*"
geox-url:
  geoip: "https://cdn.jsdelivr.net/gh/Loyalsoldier/geoip@release/geoip.dat"
  geosite: "https://cdn.jsdelivr.net/gh/Loyalsoldier/v2ray-rules-dat@release/geosite.data"
  mmdb: "https://cdn.jsdelivr.net/gh/Loyalsoldier/geoip@release/Country.mmdb"
  asn: "https://cdn.jsdelivr.net/gh/Loyalsoldier/geoip@release/Country-asn.mmdb"
find-process-mode: strict 
unified-delay: true
tcp-concurrent: true
experimental:
  quic-go-disable-gso: false
  quic-go-disable-ecn: false
profile:
  store-selected: true
  store-fake-ip: true
sniffer:
  enable: true
  parse-pure-ip: true
  sniff:
    TLS:
      ports: [443, 8443]
    HTTP:
      ports: [80, '8080-8880']
   # QUIC:
   #  ports: [443, 784]
  skip-domain:
    - "Mijia Cloud" 
    - "dlg.io.mi.com" 
    - "+.mi.com"
    - "+.apple.com"
    - "*.viber.com"
    - "viber.com"
  force-dns-mapping: false
  override-destination: true
dns:
  enable: true
  cache-algorithm: arc
  cache-max-size: 1024
  use-hosts: true
  use-system-hosts: true
  listen: 0.0.0.0:1053
  ipv6: false
  default-nameserver:
    - 8.8.8.8
    - 1.1.1.1
  nameserver:
    - https://dns.google/dns-query
    - https://1.1.1.1/dns-query
    - 8.8.8.8
    - 1.1.1.1    
  proxy-server-nameserver:
    - https://dns.google/dns-query
    - https://1.1.1.1/dns-query
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:      
    - "*.lan"
    - "*.localdomain"
    - "localhost.ptlogin2.qq.com"
    - "dns.msftncsi.com"
    - "*.msftconnecttest.com"
    - "*.srv.nintendo.net"
    - "*.stun.playstation.net"
    - "*.xboxlive.com"
    - "+.pool.ntp.org"
    - "+.time.windows.com"
    - "+.time.apple.com"
  fallback:
    - 'tls://8.8.8.8:853'
    - 'tls://1.1.1.1:853'
    - '8.8.8.8'
    - '8.8.4.4'
    - '1.1.1.1'
    - '1.0.0.1'
  fallback-filter:
    geoip: true
    geoip-code: MM
    geosite:
      - gfw
      
tun:
  enable: true
  stack: mixed
  dns-hijack:
    - "any:53"
    - "tcp://any:53"
  auto-route: true
  auto-detect-interface: true    
  
